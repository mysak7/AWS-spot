<div class="p-4 bg-green-950 border border-green-800 rounded-xl space-y-3 mt-2">
  <div class="flex items-center gap-2 text-green-300 font-semibold text-sm">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    Instance launched: {{ host.host_id }}
  </div>
  <div class="grid grid-cols-2 gap-2 text-xs">
    <div class="text-slate-400">Type: <span class="text-slate-200">{{ host.instance_type }}</span></div>
    <div class="text-slate-400">AZ: <span class="text-slate-200">{{ host.az }}</span></div>
    <div class="text-slate-400">IP: <span class="text-slate-200 font-mono">{{ host.public_ip }}</span></div>
    <div class="text-slate-400">Cost: <span class="text-green-400">${{ host.spot_price_usd }}/hr · ${{ host.monthly_price_usd }}/mo</span></div>
  </div>
  <div class="bg-slate-900 rounded-lg px-3 py-2 font-mono text-xs text-green-300 border border-slate-700 flex items-center justify-between gap-2">
    <span class="truncate">{{ host.ssh_cmd }}</span>
    <button onclick="copyText('{{ host.ssh_cmd }}', this)"
            class="shrink-0 text-slate-500 hover:text-slate-300 transition-colors text-xs">copy</button>
  </div>
  <div class="flex gap-2 pt-1">
    <button onclick="$store.launch.hide()"
            class="px-3 py-1.5 text-xs rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors">
      Close
    </button>
    <a href="/inventory"
       class="px-3 py-1.5 text-xs rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-200 transition-colors">
      View in Inventory →
    </a>
  </div>
</div>
