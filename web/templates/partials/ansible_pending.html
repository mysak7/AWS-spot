<div hx-get="/host/{{ host_id }}/ansible/status/{{ job_id }}"
     hx-trigger="every 3s"
     hx-target="this"
     hx-swap="outerHTML">
  <div class="flex items-center gap-2 text-xs text-purple-300 mb-2">
    <svg class="w-4 h-4 shrink-0 spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
    </svg>
    <span class="font-medium">Running ansible-playbook…</span>
  </div>
  {% if job.result %}
  <div class="bg-black/50 border border-slate-700 rounded-lg p-3 font-mono text-xs text-slate-300 overflow-auto max-h-64 space-y-0.5">
    {% for line in job.result[-40:] %}
    <div class="whitespace-pre-wrap break-all leading-4">{{ line }}</div>
    {% endfor %}
  </div>
  {% else %}
  <div class="text-xs text-slate-500 italic">Waiting for output…</div>
  {% endif %}
</div>
