<div hx-get="/launch/status/{{ job_id }}"
     hx-trigger="every 4s"
     hx-target="this"
     hx-swap="outerHTML"
     class="flex items-center gap-3 p-4 bg-slate-800 border border-slate-700 rounded-xl text-sm mt-2">
  <svg class="w-5 h-5 text-green-400 shrink-0 spin" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
  </svg>
  <div>
    <div class="text-slate-200 font-medium">Provisioning…</div>
    <div class="text-slate-400 text-xs mt-0.5">{{ job.message }}</div>
  </div>
</div>
