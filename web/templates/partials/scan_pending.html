<div hx-get="/scan/status/{{ job_id }}"
     hx-trigger="every 2s"
     hx-target="#results"
     hx-swap="innerHTML"
     class="bg-slate-900 border border-slate-800 rounded-xl p-10 flex flex-col items-center gap-4">
  <svg class="w-8 h-8 text-green-400 spin" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
  </svg>
  <div class="text-center">
    <div class="text-slate-200 font-medium text-sm">Scanning spot prices…</div>
    <div class="text-slate-500 text-xs mt-1">{{ message }}</div>
  </div>
</div>
