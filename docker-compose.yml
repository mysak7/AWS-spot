services:
  web:
    build: .
    network_mode: host
    volumes:
      # App data (persistent across restarts)
      - ./credentials.json:/app/credentials.json:ro
      - ./bridge_config.json:/app/bridge_config.json
      - ./hosts.json:/app/hosts.json
      - ./llm_log.jsonl:/app/llm_log.jsonl
      - ./keys:/app/keys
      - ./sessions:/app/sessions
      # Claude Code — mount Node runtime + package + config from host
      - /usr/bin/node:/usr/bin/node:ro
      - /usr/lib/node_modules/@anthropic-ai/claude-code:/usr/lib/node_modules/@anthropic-ai/claude-code:ro
      - /home/mi/.claude.json:/home/claudeuser/.claude.json:ro
      - /home/mi/.claude:/home/claudeuser/.claude
    user: "1000:1000"
    restart: unless-stopped
